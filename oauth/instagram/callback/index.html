<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Instagram OAuth Callback</title>
    <style>
      body {
        color: #222;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
        margin: 4rem auto;
        max-width: 42rem;
        padding: 0 1rem;
      }
      code {
        background: #f4f4f5;
        border-radius: 4px;
        padding: 2px 6px;
      }
    </style>
  </head>
  <body>
    <h1>Completing Instagram OAuth</h1>
    <p id="status">Redirecting back to the local Marketing Agent OAuth helper...</p>
    <p>If the redirect does not happen, make sure the helper is running locally.</p>
    <script>
      (function () {
        var target = new URL('http://127.0.0.1:3199/marketing-agent-policies/oauth/instagram/callback/');
        target.search = window.location.search;
        window.location.replace(target.toString());
      })();
    </script>
  </body>
</html>
